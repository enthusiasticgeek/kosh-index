[book]
title = "Kosh — vāṇī Package Registry"
authors = ["vāṇī contributors"]
description = "Documentation for the Kosh package registry: using packages, publishing, and the registry protocol."
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/enthusiasticgeek/kosh-index"
edit-url-template = "https://github.com/enthusiasticgeek/kosh-index/edit/main/portal/{path}"
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1

[output.html.playground]
runnable = false

[output.html.fold]
enable = true
level = 1
